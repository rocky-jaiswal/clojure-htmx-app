services:
  db-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       htmx_app_test
      POSTGRES_USER:     htmx_app_test
      POSTGRES_PASSWORD: test_secret
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U htmx_app_test"]
      interval: 3s
      timeout: 3s
      retries: 5
